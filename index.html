<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bilimlar Oroli</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            text-align: center; background-color: #f0f8ff; 
            margin: 0; padding: 10px; overflow: hidden; 
        }
        .robo-ustoz { 
            background: #ffffff; border-radius: 15px; padding: 15px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; 
        }
        .speech-bubble { 
            background: #e0f7fa; padding: 10px; border-radius: 10px; 
            border: 2px solid #00bcd4; margin-top: 10px; font-weight: bold; color: #006064;
            min-height: 45px;
        }
        
        .ans-btn {
            background: #2196F3; color: white; padding: 15px 25px;
            border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; margin: 5px;
        }
        .ans-btn:active { background: #0b7dda; }
        
        .btn-finish { 
            background: #4CAF50; color: white; padding: 15px 30px; 
            border: none; border-radius: 10px; font-size: 18px; 
            font-weight: bold; cursor: pointer; margin: 20px auto; display: none;
        }
    </style>
</head>
<body>

    <div class="robo-ustoz">
        <h3>🤖 Robo-Ustoz</h3>
        <div class="speech-bubble" id="robo-text">Dars yuklanmoqda... ⏳</div>
    </div>

    <div id="dars-qolipi">
        <h2 id="dars-sarlavha">Sarlavha</h2>
        <p id="dars-savol" style="font-size: 18px; color: #5d4037;">Savol matni</p>
        <div id="dars-rasm" style="font-size: 60px; margin: 20px;">🖼</div>
        
        <div id="tugmalar-qutisi"></div> 
        
        <button class="btn-finish" id="finish-btn" onclick="yakunlash()">🏆 Modulni yakunlash</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        // ==========================================
        // 1. MA'LUMOTLAR OMBORI (Barcha darslar shu yerda)
        // ==========================================
        const barchaModullar = {
            "1": {
                sarlavha: "🍎 1-Modul: Sanash",
                savol: "Ayiqchaning asallari nechta?",
                rasm: "🍯 🍯 🍯",
                variantlar: [2, 3, 4],
                javob: 3,
                tabrik: "Oshqoyil! To'g'ri topdingiz! 🎉"
            },
            "2": {
                sarlavha: "🚀 2-Modul: Matematika",
                savol: "Raketa uchishi uchun misolni yeching:\n 5 + 3 = ?",
                rasm: "🚀 🌌",
                variantlar: [7, 8, 9],
                javob: 8,
                tabrik: "Uraaa! Raketa parvozga tayyor! 🚀"
            },
            "3": {
                sarlavha: "🪐 3-Modul: Koinot",
                savol: "Quyosh sistemasidagi eng katta sayyora qaysi?",
                rasm: "🌍 🪐 🔴",
                variantlar: ["Yer", "Yupiter", "Mars"],
                javob: "Yupiter",
                tabrik: "Barakalla! Yupiter haqiqatan ham eng kattasi! 🪐"
            },
            "4": {
                sarlavha: "🚦 4-Modul: Mantiq",
                savol: "Svetoforning eng tepasida qaysi rang joylashgan?",
                rasm: "🚦",
                variantlar: ["Yashil", "Sariq", "Qizil"],
                javob: "Qizil",
                tabrik: "To'ppa-to'g'ri! Qizil chiroqda to'xtash kerak. 🛑"
            },
            "5": {
                sarlavha: "🐟 5-Modul: Jonivorlar",
                savol: "Faqat suvda yashaydigan jonivorni toping:",
                rasm: "🌊",
                variantlar: ["🐈", "🐟", "🐓"],
                javob: "🐟",
                tabrik: "Zo'r! Baliqlar faqat suvda yashaydi. 💦"
            }
        };

        // ==========================================
        // 2. DASTUR MANTIQI (Miyya)
        // ==========================================
        const roboText = document.getElementById('robo-text');
        const sarlavha = document.getElementById('dars-sarlavha');
        const savol = document.getElementById('dars-savol');
        const rasm = document.getElementById('dars-rasm');
        const tugmalarQutisi = document.getElementById('tugmalar-qutisi');
        const finishBtn = document.getElementById('finish-btn');

        // Linkdan modul raqamini olamiz
        const urlParams = new URLSearchParams(window.location.search);
        const joriyRaqam = urlParams.get('modul') || '1'; 
        
        // Tanlangan darsni ombordan olib chiqamiz
        const joriyDars = barchaModullar[joriyRaqam];

        if (joriyDars) {
            // Qolipni to'ldiramiz
            sarlavha.innerText = joriyDars.sarlavha;
            savol.innerText = joriyDars.savol;
            rasm.innerText = joriyDars.rasm;
            roboText.innerText = "Salom! To'g'ri javobni topishga harakat qiling.";

            // Tugmalarni avtomatik yaratamiz
            joriyDars.variantlar.forEach(variant => {
                let btn = document.createElement("button");
                btn.className = "ans-btn";
                btn.innerText = variant;
                btn.onclick = () => javobniTekshirish(variant);
                tugmalarQutisi.appendChild(btn);
            });
        } else {
            roboText.innerText = "Kechirasiz, bunday dars hozircha yo'q.";
        }

        // Javobni tekshirish qismi
        function javobniTekshirish(tanlanganJavob) {
            if (tanlanganJavob === joriyDars.javob) {
                roboText.innerText = joriyDars.tabrik;
                finishBtn.style.display = "block"; // Keyingi bosqich tugmasi chiqadi
            } else {
                roboText.innerText = "Xato! Yana bir bor o'ylab ko'ring.";
            }
        }

        // Botga xabar yuborish
        function yakunlash() {
            roboText.innerText = "Natija serverga saqlanmoqda... 💾";
            setTimeout(() => {
                tg.sendData(`modul_${joriyRaqam}_tugadi`); // Qaysi modul tugaganini botga aytadi
            }, 1500);
        }
    </script>
</body>
</html>
